name: Python Checks

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install tools
      run: |
        pip install flake8 pytest

    - name: Lint (syntax + style)
      run: |
        flake8 .

    - name: Run tests
      run: |
        pytest
